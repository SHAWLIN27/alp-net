version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: alpnet-chromadb
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - ./docker-data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
